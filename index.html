<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro-Pulse: Research Feed</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --accent: #58a6ff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        h1 { font-size: 1.5rem; color: var(--accent); border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        .paper { background: var(--card); padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #30363d; }
        .title { font-weight: bold; font-size: 1.1rem; color: #fff; text-decoration: none; display: block; margin-bottom: 8px; }
        .meta { font-size: 0.85rem; color: #8b949e; margin-bottom: 10px; }
        .tag { display: inline-block; background: #238636; color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; margin-right: 5px; }
        .loading { text-align: center; margin-top: 50px; color: var(--accent); }
    </style>
</head>
<body>

    <h1>✨ Astro-Pulse Daily</h1>
    <div id="feed">
        <div class="loading">Fetching latest papers...</div>
    </div>

    <script>
        // Tailored keywords for your specific research areas
        const KEYWORDS = ['exoplanet', 'orbital resonance', '21cm', 'radio astronomy', 'stability'];
        
        async function fetchPapers() {
            // Using a public CORS proxy to ensure it works on mobile immediately
            const proxy = "https://corsproxy.io/?";
            const arxivUrl = "https://export.arxiv.org/api/query?search_query=cat:astro-ph.EP+OR+cat:astro-ph.IM+OR+cat:astro-ph.GA&sortBy=submittedDate&sortOrder=descending&max_results=25";
            
            try {
                const response = await fetch(proxy + encodeURIComponent(arxivUrl));
                const text = await response.text();
                const parser = new DOMParser();
                const xml = parser.parseFromString(text, "text/xml");
                const entries = xml.getElementsByTagName("entry");
                
                let html = "";
                for (let entry of entries) {
                    const title = entry.getElementsByTagName("title")[0].textContent;
                    const summary = entry.getElementsByTagName("summary")[0].textContent;
                    const id = entry.getElementsByTagName("id")[0].textContent.replace("abs", "pdf") + ".pdf";
                    const categories = Array.from(entry.getElementsByTagName("category")).map(c => c.getAttribute("term"));
                    
                    // Highlight papers that match your specific interests
                    const isRelevant = KEYWORDS.some(k => title.toLowerCase().includes(k) || summary.toLowerCase().includes(k));
                    
                    html += `
                        <div class="paper" style="${isRelevant ? 'border-left: 4px solid #58a6ff' : ''}">
                            ${isRelevant ? '<span class="tag">TOP MATCH</span>' : ''}
                            <a class="title" href="${id}" target="_blank">${title}</a>
                            <div class="meta">${summary.substring(0, 150)}...</div>
                            <div class="meta"><b>Cats:</b> ${categories.join(", ")}</div>
                        </div>
                    `;
                }
                document.getElementById("feed").innerHTML = html;
            } catch (err) {
                document.getElementById("feed").innerHTML = `<div class="loading">Error: ${err.message}. Check CORS Proxy status.</div>`;
            }
        }

        fetchPapers();
    </script>
</body>
</html>
